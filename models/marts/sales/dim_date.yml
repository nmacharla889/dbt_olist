version: 2

models:
  - name: dim_date
    description: "The table provides detailed information about dates, which can be useful for time-based analyses.  Possible use cases include scheduling, trend analysis over time, and generating reports that require date filters."
    columns:
      - name: date_day
        data_type: date
        description: "The actual date value"
        tests:
          - not_null
          - unique

      - name: date_key
        data_type: int
        description: "Surrogate key for the date"

      - name: year
        data_type: int
        description: "The year component of the date"

      - name: month_num
        data_type: int
        description: "The month component of the date"

      - name: month_name
        data_type: string
        description: "The name of the month"

      - name: month_short
        data_type: string
        description: "The short name of the month"

      - name: quarter_num
        data_type: int
        description: "The quarter component of the date"

      - name: quarter_label
        data_type: string
        description: "The label for the quarter"

      - name: day_of_week
        data_type: int
        description: "The day of the week component of the date, where 1 represents Monday and 7 represents Sunday"

      - name: day_name
        data_type: string
        description: "The name of the day of the week"

      - name: day_short
        data_type: string
        description: "The short name of the day of the week"

      - name: day_of_month
        data_type: int
        description: "The day of the month component of the date"

      - name: day_of_year
        data_type: int
        description: "The day of the year component of the date"

      - name: week_of_year
        data_type: int
        description: "The week of the year component of the date"

      - name: is_weekend
        data_type: boolean
        description: "Indicates whether the date falls on a weekend (true) or a weekday (false) "

      - name: year_month
        data_type: string
        description: "The year and month component of the date in the format 'YYYY-MM'"