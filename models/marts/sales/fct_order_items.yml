version: 2

models:
  - name: fct_order_items
    description: "The table contains detailed information about order items in the system. This table can be used for analyzing sales performance, assessing delivery     efficiency, evaluating payment trends, and understanding customer feedback through review scores. Grain: one row per order line item (order_id + order_item_id).Contains all foreign keys to dimension tables and measurable facts (price, freight). Order-level attributes are intentionally excluded — join to source or an order-level aggregate if needed."
    columns:
      - name: order_item_key
        data_type: string
        description: "Surrogate primary key generated via dbt_utils.generate_surrogate_key hashed on order_id and item_id"

      - name: product_key
        data_type: string
        description: "Foreign key to dim_products"

      - name: seller_key
        data_type: string
        description: "Foreign key to dim_sellers"

      - name: customer_key
        data_type: string
        description: "Foreign key to dim_customers"

      - name: order_purchase_date_key
        data_type: int
        description: "Foreign key to dim_dates based on order_purchase_date"

      - name: order_id
        data_type: string
        description: "Unique identifier for each order, shared across all items in the same order."

      - name: item_id
        data_type: bigint
        description: "Unique identifier for each item within an order. For example, if an order has three items, they will have item_id values of 1, 2, and 3."

      - name: order_status
        data_type: string
        description: "The status of the order (e.g., shipped, delivered)."

      - name: order_purchase_date
        data_type: date
        description: "The date when the order was purchased."

      - name: order_approved_date
        data_type: date
        description: "The date when the order was approved."

      - name: order_delivered_carrier_date
        data_type: date
        description: "The date when the order was delivered by the carrier. This is the date when the order was handed over to the delivery service, not necessarily when it was delivered to the customer. This date can be used to analyze the efficiency of the delivery process and to calculate delivery times."

      - name: order_delivered_customer_date
        data_type: date
        description: "The date when the order was delivered to the customer."

      - name: order_estimated_delivery_date
        data_type: date
        description: "The date when the order is estimated to be delivered. This can be used to analyze the accuracy of delivery estimates and to calculate delivery delays."

      - name: delivery_delay_days
        data_type: int
        description: "The number of days by which the order was delivered after the estimated delivery date."

      - name: item_price_in_brl
        data_type: double
        description: "The price of the item in Brazilian Real (BRL). This is the amount paid by the customer for this specific item, excluding any discounts or promotions."

      - name: item_freight_value_in_brl
        data_type: double
        description: "The freight value of the item in Brazilian Real (BRL). This is the cost associated with shipping the item to the customer."
        
      - name: total_item_value_in_brl
        data_type: double
        description: "The total value of the item in Brazilian Real (BRL), including price and freight."

      - name: total_payment_value_in_brl
        data_type: double
        description: "The total value of the payment in Brazilian Real (BRL)."

      - name: max_payment_installments
        data_type: bigint
        description: "The maximum number of installments allowed for the payment. This can be used to analyze payment preferences and trends among customers."

      - name: payment_method_count
        data_type: bigint
        description: "The number of different payment methods used for the order."

      - name: paid_by_credit_card
        data_type: int
        description: "Indicator of whether the order was paid by credit card (1) or not (0)."

      - name: paid_by_boleto
        data_type: int
        description: "Indicator of whether the order was paid by boleto (1) or not (0)."

      - name: paid_by_voucher
        data_type: int
        description: "Indicator of whether the order was paid by voucher (1) or not (0)."

      - name: paid_by_debit_card
        data_type: int
        description: "Indicator of whether the order was paid by debit card (1) or not (0)."

      - name: avg_review_score
        data_type: double
        description: ""