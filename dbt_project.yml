name: 'olist'
version: '1.0.0'

profile: 'olist'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

dispatch:
  - macro_namespace: dbt_utils
    search_order: ['dbt_utils']

target-path: "target"      
clean-targets:        
  - "target"
  - "dbt_packages"

seeds:
  olist:
    +schema: raw

models:
  olist:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
    snapshot:
      +schema: snapshot
    intermediate:
      +materialized: view
      +schema: intermediate
