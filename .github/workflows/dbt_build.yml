name: dbt build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-databricks

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          olist:
            target: databricks
            outputs:
              databricks:
                type: databricks
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                catalog: workspace
                schema: olist_dev
          EOF
      - name: Install dbt packages
        run: dbt deps --project-dir .
        
      - name: dbt build
        run: dbt build --project-dir .
